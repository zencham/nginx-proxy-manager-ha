---
# SSH connection
ansible_user: debian

# Pacemaker cluster name
pacemaker_cluster_name: npm_ha_cluster

# Node topology
node1_name:    MIBTECH-NPM-PROD-01
node1_address: 192.168.206.33
node2_name:    MIBTECH-NPM-PROD-02
node2_address: 192.168.206.40

# Virtual IP
vip_address: 192.168.206.220
vip_cidr:    "24"

# DRBD underlying physical block devices
# WARNING: verify with `lsblk` on each node before first run.
# Wrong disk = data loss. No default is set intentionally.
drbd_backing_dev_app: /dev/sdb1
drbd_backing_dev_db:  /dev/sdb2

# DRBD resource names (used by pcs and drbdadm — must be stable after first deploy)
# NOTE: drbd_resource_app MUST stay mib_npm_ha_drbd_npm — this is the name the
# live MIBTECH cluster was deployed with (pacemaker drbd_app + on-disk DRBD
# metadata reference it). A 2026-06-16 rename to _app re-rendered npm-ha.res with
# a name pacemaker could not find, stopping the cluster. Do not rename post-deploy.
drbd_resource_app: mib_npm_ha_drbd_npm
drbd_resource_db:  mib_npm_ha_drbd_db

# NPM application paths (shared across npm_ha and npm_update roles)
npm_compose_dir: /opt/npm/compose
npm_mount_app: /mnt/npm_app
npm_mount_db: /mnt/npm_db
npm_admin_port: 15625

# Container image versions — authoritative source for both npm_ha and npm_update roles.
# Bump these values here, then run npm_update.yml to apply.
npm_image_version: "2.15.1"
mariadb_image_version: "10.11.16"

# Container timezone (sets TZ env var in MariaDB and NPM containers)
container_timezone: Africa/Casablanca
