---
- name: Deploy DRBD configuration file
  template:
    src: npm-ha.res.j2
    dest: /etc/drbd.d/npm-ha.res
    owner: root
    group: root
    mode: '0600'

- name: Check if DRBD metadata already exists
  shell: >
    drbdadm role {{ drbd_resource_app }} 2>/dev/null ||
    drbdadm dump-md {{ drbd_resource_app }} 2>/dev/null
  register: drbd_md_check
  ignore_errors: true
  changed_when: false

- name: Initialize DRBD metadata (only if not already created)
  command: drbdadm create-md all --force
  when: drbd_md_check.rc != 0
  register: drbd_init

- name: Bring DRBD resources up
  command: drbdadm up all
  ignore_errors: true
  when: drbd_init.changed | default(false) or drbd_md_check.rc != 0

- name: Force primary role on node 1 to initiate first sync
  command: drbdadm primary --force all
  run_once: true
  delegate_to: "{{ node1_hostname }}"
  when: drbd_init.changed | default(false)

- name: Wait for app DRBD device node to be available
  wait_for:
    path: "{{ drbd_device_app }}"
    timeout: 60
  run_once: true
  delegate_to: "{{ node1_hostname }}"
  when: drbd_init.changed | default(false)

- name: Wait for db DRBD device node to be available
  wait_for:
    path: "{{ drbd_device_db }}"
    timeout: 60
  run_once: true
  delegate_to: "{{ node1_hostname }}"
  when: drbd_init.changed | default(false)

- name: Format app DRBD device as ext4
  filesystem:
    fstype: ext4
    dev: "{{ drbd_device_app }}"
    force: false
  run_once: true
  delegate_to: "{{ node1_hostname }}"
  when: drbd_init.changed | default(false)

- name: Format db DRBD device as ext4
  filesystem:
    fstype: ext4
    dev: "{{ drbd_device_db }}"
    force: false
  run_once: true
  delegate_to: "{{ node1_hostname }}"
  when: drbd_init.changed | default(false)
