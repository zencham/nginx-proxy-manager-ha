---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: npm-preflight-node1
    image: debian:trixie
    pre_build_image: true
    privileged: true
    groups:
      - ha_nodes
  - name: npm-preflight-node2
    image: debian:trixie
    pre_build_image: true
    privileged: true
    groups:
      - ha_nodes
provisioner:
  name: ansible
  inventory:
    group_vars:
      ha_nodes:
        node1_hostname: npm-preflight-node1
        node2_hostname: npm-preflight-node2
        node1_ip: "{{ hostvars['npm-preflight-node1']['ansible_default_ipv4']['address'] }}"
        node2_ip: "{{ hostvars['npm-preflight-node2']['ansible_default_ipv4']['address'] }}"
        cluster_name: npm_ha_test_cluster
        vip_address: 192.168.100.100
        vip_cidr: "24"
        drbd_disk_app: /dev/nonexistent_app
        drbd_disk_db: /dev/nonexistent_db
        drbd_resource_app: test_drbd_npm
        drbd_resource_db: test_drbd_db
        timezone: UTC
        hacluster_password: test-hacluster-pass
        drbd_secret: test-drbd-secret
        mysql_root_password: test-root-pass
        mysql_npm_password: test-npm-pass
verifier:
  name: ansible
