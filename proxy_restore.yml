---
- name: Restore missing NPM proxy hosts from the latest snapshot
  hosts: controller
  gather_facts: false
  tasks:
    - name: Authenticate to NPM API
      ansible.builtin.import_role:
        name: proxy_guard
        tasks_from: auth.yml

    - name: Restore missing proxy hosts
      ansible.builtin.import_role:
        name: proxy_guard
        tasks_from: restore.yml
